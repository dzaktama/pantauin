<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terjadi Kesalahan | PANTAUIN</title>
    <!-- Hanya Bootstrap 5 CSS dari jsDelivr CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .error-card { 
            max-width: 500px; 
            margin: auto; 
            padding: 3rem; 
            border-radius: 1rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            background: #ffffff;
        }
        .text-dark { color: #1B2A6B !important; }
        .btn-primary-custom { 
            background-color: #1B2A6B; 
            border-color: #1B2A6B; 
            color: #ffffff;
        }
        .btn-primary-custom:hover {
            background-color: #152259;
            border-color: #152259;
            color: #ffffff;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="container text-center">
        <div class="error-card">
            <!-- Tampilan responsif dengan teks kontras tinggi (WCAG AA) -->
            <h1 class="display-1 text-danger mb-3" aria-hidden="true">⚠️</h1>
            <h2 class="h4 text-dark fw-bold mb-3">Ups, ada yang tidak beres.</h2>
            <p class="text-secondary mb-4" style="color: #4a5568 !important;">{{ pesan|default('Sistem memicu ralat tak terduga. Silakan kembali bermain ke halaman utama.') }}</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary-custom btn-lg w-100 py-2" aria-label="Kembali ke beranda utama PANTAUIN">Kembali ke Beranda</a>
        </div>
    </div>
</body>
</html>
